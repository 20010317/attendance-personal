<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSテスト</title>
</head>
<body style="font-family:sans-serif; text-align:center; padding-top:50px;">

<h1 id="clock" style="font-size:40px;">--:--:--</h1>
<p id="status" style="color:red; font-weight:bold;">JSはまだ実行されていません</p>
<button onclick="document.getElementById('status').innerText='ボタンは反応しています！'; document.getElementById('status').style.color='green';">
  ボタンを押してテスト
</button>

<script>
document.getElementById('status').innerText = 'JSは実行されています（この時点で緑になるはず）';
document.getElementById('status').style.color = 'green';

function tick(){
  const now = new Date();
  document.getElementById('clock').innerText =
    now.getHours().toString().padStart(2,'0') + ':' +
    now.getMinutes().toString().padStart(2,'0') + ':' +
    now.getSeconds().toString().padStart(2,'0');
}
setInterval(tick, 1000);
tick();
</script>

</body>
</html>
